<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paleogeographic Maps Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: Arial, sans-serif; height: 100vh; display: flex; flex-direction: column; }
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 12px; background: #2c3e50; color: #fff;
    font-size: 13px; flex-shrink: 0;
  }
  .toolbar label { font-weight: bold; }
  .toolbar select {
    padding: 3px 6px; font-size: 12px; border-radius: 3px;
    border: 1px solid #7f8c8d; background: #ecf0f1; min-width: 160px;
  }
  .toolbar .btn-pdf {
    padding: 4px 10px; font-size: 11px; border-radius: 3px;
    border: 1px solid #7f8c8d; background: #e74c3c; color: #fff;
    cursor: pointer; font-weight: bold; font-family: Arial, sans-serif;
  }
  .toolbar .btn-pdf:hover { background: #c0392b; }
  .toolbar .btn-pdf.disabled {
    background: #95a5a6; cursor: default; pointer-events: none; opacity: 0.7;
  }
  iframe { flex: 1; border: none; width: 100%; }
</style>
</head>
<body>
<div class="toolbar">
  <label for="mapSelect">Map:</label>
  <select id="mapSelect" onchange="onSelectMap(this.value)"></select>
  <button id="pdfBtn" class="btn-pdf disabled" onclick="downloadPdf()">&#8681; PDF</button>
</div>
<iframe id="mapFrame"></iframe>
<script>
var _maps = [{"path": "GENERATED_KNN_IDW_MAPS/map_65_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "65 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_65_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_70_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "70 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_70_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_75_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "75 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_75_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_80_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "80 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_80_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_85_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "85 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_85_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_90_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "90 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_90_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_95_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "95 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_95_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_100_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "100 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_100_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_105_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "105 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_105_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_110_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "110 Ma", "pdf": "GENERATED_KNN_IDW_MAPS/map_110_ma_knn_idw_power4.0_gradient_sharp18.0.pdf"}, {"path": "GENERATED_KNN_IDW_MAPS/map_115_ma_knn_idw_power4.0_gradient_sharp18.0.html", "label": "1 var _currentPdf = '';
(function() {
  var select = document.getElementById('mapSelect');
  _maps.forEach(function(m, i) {
    var opt = document.createElement('option');
    opt.value = i;
    opt.textContent = m.label;
    select.appendChild(opt);
  });
  if (_maps.length > 0) onSelectMap(0);
})();

function onSelectMap(idx) {
  var m = _maps[idx];
  document.getElementById('mapFrame').src = m.path;
  var btn = document.getElementById('pdfBtn');
  _currentPdf = m.pdf || '';
  if (_currentPdf) {
    btn.classList.remove('disabled');
  } else {
    btn.classList.add('disabled');
  }
}

function downloadPdf() {
  if (!_currentPdf) return;
  var a = document.createElement('a');
  a.href = _currentPdf;
  a.download = _currentPdf.split('/').pop();
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
</script>
</body>
</html>
